name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: salescount_test
          POSTGRES_USER: salescount
          POSTGRES_PASSWORD: Kaustubh@149
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements/dev.txt

      - name: Lint with ruff
        run: ruff check backend/

      - name: Run tests
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: salescount.settings.dev
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: postgres://salescount:salescount_test@localhost:5432/salescount_test
          REDIS_URL: redis://localhost:6379/0
          DEBUG: 'True'
        run: pytest --cov=apps --cov-report=xml -v

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build
